    /* TWINKLE STARS */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    opacity: 0.8;
    animation: twinkle 2s infinite ease-in-out alternate;
}

/* GOLD */
.sparkle.gold {
    background: radial-gradient(circle, #ffd700, #c9a34a);
    box-shadow: 0 0 6px #ffd700;
}

/* SILVER */
.sparkle.silver {
    background: radial-gradient(circle, #ffffff, #c0c0c0);
    box-shadow: 0 0 5px #ffffff;
}

/* TWINKLE ANIMATION */
@keyframes twinkle {
    0% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0.5; transform: scale(1); }
}
}
    .button:hover {
    box-shadow: 0 0 15px rgba(201,163,74,0.7);
    transform: scale(1.05);
    }
    .names, .title {
    text-shadow: 0 0 8px rgba(255,255,255,0.5);
    }
    .name-block {
    text-align: center;
    margin: 20px 0;
}
    .name-block {
    position: relative;
    z-index: 5;
    }
.title {
    background: linear-gradient(90deg, #c9a34a, #fff2c2, #c9a34a);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s infinite linear;
}

@keyframes shine {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}
.name {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
    animation: fadeUp 2s ease;
}

.heart {
    display: inline-block;   /* important */
    font-size: 28px;
    margin: 8px 0;
    will-change: transform;
    animation: heartbeat 1s infinite;

    transform-origin: center; /* prevents shifting */
}
    .frame1, .frame2 {
    position: fixed;
    transform: none !important;
    }

/* Heart animation */
@keyframes heartbeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.2); }
    40% { transform: scale(0.9); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* Smooth entry */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    .heart {
    color: #e63946;
    text-shadow: 0 0 10px #ff6b6b;
    }
    .heart {
    animation: heartbeat 1.2s infinite, glowHeart 2s infinite alternate;
}

@keyframes glowHeart {
    from { filter: drop-shadow(0 0 5px red); }
    to { filter: drop-shadow(0 0 15px red); }
}
    
    /* BASE FLORAL */
.floral {
    position: fixed;
    width: 120px;
    height: 120px;
    pointer-events: none;
    z-index: 0;
}

/* LEFT SIDE */
.floral-left {
    bottom: 20px;
    left: 10px;
}

/* RIGHT SIDE */
.floral-right {
    top: 20px;
    right: 10px;
}

/* FLOWER PETALS */
.floral::before,
.floral::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;
}

/* BIG PETAL */
.floral::before {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #f8c8dc, #f2a7c0);
}

/* SMALL PETAL */
.floral::after {
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, #ffd6e8, #f8c8dc);
    top: 30px;
    left: 40px;
}

/* EXTRA BLOOM EFFECT */
.floral-left {
    box-shadow:
        40px 20px 0 10px rgba(248, 200, 220, 0.4),
        70px 60px 0 5px rgba(255, 200, 220, 0.3);
}

.floral-right {
    box-shadow:
        -40px 20px 0 10px rgba(248, 200, 220, 0.4),
        -70px 60px 0 5px rgba(255, 200, 220, 0.3);
}

.frame1, .frame2 {

.frame2 {

/* CONTENT */
.container {

/* TEXT STYLES */
.title {

.names {

    margin: 10px 0;
    animation: glow 2s infinite alternate;
}

.text {
    margin: 10px 0;
}
    
.petal {
    background: #f8c8dc;
    opacity: 0.5;
    border-radius: 50%;
    filter: blur(1px);
}

/* BUTTON */
.button {
    display: inline-block;
    margin: 10px;
    padding: 10px 22px;
    border-radius: 25px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* COUNTDOWN */
#countdown {
    margin-top: 15px;
    font-size: 15px;
}

/* COUPLE IMAGE */
.couple {
    position: fixed;
    bottom: -10px;
    right: 0;
    width: 65vw;
    max-width: 340px;
    z-index: 2;
}
.couple {
    animation: fadeInLeft 2s ease 1s forwards;
    opacity: 0;
}
    @keyframes fadeInLeft {
    from {
        opacity: 0;
        transform: translateX(-40px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateX(0) scale(1);
    }
    }
    
    .button:hover {
    box-shadow: 0 0 15px rgba(201,163,74,0.7);
    transform: scale(1.05);
}

/* FLOWER */
.flower {
    position: fixed;
    bottom: 20px;
    left: 10px;
    width: 120px;
    opacity: 0.5;
}

/* RING */
.ring {
    position: fixed;
    top: 30px;
    left: 30px;
    font-size: 30px;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
@keyframes glow {
    from {text-shadow: 0 0 5px gold;}
    to {text-shadow: 0 0 20px gold;}
}

/* PETALS */
.petal {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}
@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}
