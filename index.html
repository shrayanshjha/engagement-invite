<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrayansh ❤️ Payal | Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>
    /* BASE FLORAL */
.floral {
    position: fixed;
    width: 120px;
    height: 120px;
    pointer-events: none;
    z-index: 0;
}

/* LEFT SIDE */
.floral-left {
    bottom: 20px;
    left: 10px;
}

/* RIGHT SIDE */
.floral-right {
    top: 20px;
    right: 10px;
}

/* FLOWER PETALS */
.floral::before,
.floral::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;
}

/* BIG PETAL */
.floral::before {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #f8c8dc, #f2a7c0);
}

/* SMALL PETAL */
.floral::after {
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, #ffd6e8, #f8c8dc);
    top: 30px;
    left: 40px;
}

/* EXTRA BLOOM EFFECT */
.floral-left {
    box-shadow:
        40px 20px 0 10px rgba(248, 200, 220, 0.4),
        70px 60px 0 5px rgba(255, 200, 220, 0.3);
}

.floral-right {
    box-shadow:
        -40px 20px 0 10px rgba(248, 200, 220, 0.4),
        -70px 60px 0 5px rgba(255, 200, 220, 0.3);
}

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5e6dc;
    color: #5a3e36;
    overflow-x: hidden;
}

/* DOUBLE FRAME */
.frame1, .frame2 {
    position: fixed;
    border-radius: 20px;
    pointer-events: none;
}
.frame1 {
    top: 15px; left: 15px; right: 15px; bottom: 15px;
    border: 2px solid #c9a34a;
}
.frame2 {
    top: 25px; left: 25px; right: 25px; bottom: 25px;
    border: 1px solid #c9a34a;
}

/* CONTENT */
.container {
    text-align: center;
    padding: 80px 20px;
    animation: fadeIn 2s ease;
}

/* TEXT STYLES */
.title {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: #b68b2c;
}

.names {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
    margin: 10px 0;
    animation: glow 2s infinite alternate;
}

.text {
    margin: 10px 0;
}

/* BUTTON */
.button {
    display: inline-block;
    margin: 10px;
    padding: 10px 22px;
    border-radius: 25px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* COUNTDOWN */
#countdown {
    margin-top: 15px;
    font-size: 15px;
}

/* COUPLE IMAGE */
.couple {
    position: fixed;
    bottom: 0;
    right: 10px;
    width: 220px;
}

/* FLOWER */
.flower {
    position: fixed;
    bottom: 20px;
    left: 10px;
    width: 120px;
    opacity: 0.5;
}

/* RING */
.ring {
    position: fixed;
    top: 30px;
    left: 30px;
    font-size: 30px;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
@keyframes glow {
    from {text-shadow: 0 0 5px gold;}
    to {text-shadow: 0 0 20px gold;}
}

/* PETALS */
.petal {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}
@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}

</style>
</head>

<body>
    <!-- LEFT FLORAL -->
<div class="floral floral-left"></div>

<!-- RIGHT FLORAL -->
<div class="floral floral-right"></div>

<!-- FRAME -->
<div class="frame1"></div>
<div class="frame2"></div>

<!-- RING -->
<div class="ring">💍</div>

<!-- MAIN CONTENT -->
<div class="container">

<div class="title">Engagement Invitation</div>

<div class="names">Shrayansh ❤️ Payal</div>

<div class="text">With love, we invite you to celebrate</div>

<div class="text"><b> 04 May 2026 </b></div>

<div class="text">📍 Hotel GK Jain</div>

<a class="button" href="https://maps.app.goo.gl/zp1ytG2DvtsnHL5p6?g_st=ac" target="_blank">
View Location
</a>

<br>

<a class="button" href="https://www.google.com/calendar/render?action=TEMPLATE&text=Engagement&dates=20260504T073000Z/20260504T103000Z">
Add to Calendar
</a>

<div id="countdown"></div>

</div>

<!-- IMAGES -->
<img src="couple.png" class="couple">
<img src="flower.png" class="flower">

<script>

/* COUNTDOWN (UPDATED 1 PM) */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var d = Math.floor(distance / (1000*60*60*24));
  var h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  var m = Math.floor((distance % (1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  "⏳ " + d + " days " + h + " hrs " + m + " min left";
}, 1000);

/* PETAL ANIMATION */
function createPetal() {
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.style.left = Math.random() * window.innerWidth + "px";
  petal.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(petal);

  setTimeout(() => petal.remove(), 10000);
}

setInterval(createPetal, 500);

</script>

</body>
</html>
