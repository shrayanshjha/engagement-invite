<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrayansh ❤️ Payal | Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5e6dc;
    color: #5a3e36;
    text-align: center;
}

/* GOLD FRAME */
.frame {
    position: fixed;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border: 3px solid #c9a34a;
    border-radius: 20px;
    pointer-events: none;
    z-index: 1;
}

/* MAIN CONTENT */
.container {
    position: relative;
    z-index: 2;
    padding: 40px 20px;
}

/* HEADER */
h1 {
    font-family: 'Cinzel', serif;
    color: #b68b2c;
    font-size: 28px;
}

.names {
    font-family: 'Cinzel', serif;
    font-size: 30px;
    color: #b68b2c;
    margin: 10px 0;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.7);
    border: 1px solid #c9a34a;
    border-radius: 20px;
    padding: 20px;
    margin: 20px;
    backdrop-filter: blur(5px);
}

/* BUTTON */
.button {
    display: inline-block;
    margin: 10px;
    padding: 10px 20px;
    border-radius: 25px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* COUNTDOWN */
#countdown {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}
#countdown div {
    background: white;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #c9a34a;
}

/* COUPLE IMAGE POSITION */
.couple {
    width: 250px;
    margin-top: 20px;
}

</style>
</head>

<body>

<div class="frame"></div>

<div class="container">

<h1>💍 Engagement Invitation 💍</h1>

<div class="names">Shrayansh ❤️ Payal</div>

<p>We invite you to celebrate our special day</p>

<p><b>📅 04 May 2026</b></p>

<div class="card">

<p>📍 Venue: Hotel GK Jain</p>

<a class="button" href="https://maps.app.goo.gl/zp1ytG2DvtsnHL5p6?g_st=ac" target="_blank">
📍 View Location
</a>

<div id="countdown"></div>

<a class="button" href="https://www.google.com/calendar/render?action=TEMPLATE&text=Shrayansh%20%26%20Payal%20Engagement&dates=20260504T120000Z/20260504T150000Z">
📅 Add to Calendar
</a>

</div>

<!-- COUPLE IMAGE (LIKE YOUR CARD) -->
<img src="couple.png" class="couple">

</div>

<script>

// COUNTDOWN
var countDownDate = new Date("May 4, 2026 18:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var d = Math.floor(distance / (1000*60*60*24));
  var h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  var m = Math.floor((distance % (1000*60*60))/(1000*60));
  var s = Math.floor((distance % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
  `<div>${d}<br>Days</div>
   <div>${h}<br>Hours</div>
   <div>${m}<br>Min</div>
   <div>${s}<br>Sec</div>`;
}, 1000);

</script>

</body>
</html>
