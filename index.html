<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrayansh ❤️ Payal | Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>

/* COUNTDOWN BOX */
.countdown-box {
    margin-top: 20px;
}

#countdown {
    display: inline-block;
    padding: 10px 18px;
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: #b68b2c;
    background: rgba(255,255,255,0.7);
    border: 1px solid #c9a34a;
    border-radius: 30px;
    backdrop-filter: blur(6px);
    animation: glowCount 2s infinite alternate;
}

@keyframes glowCount {
    from { box-shadow: 0 0 5px rgba(201,163,74,0.4); }
    to { box-shadow: 0 0 18px rgba(201,163,74,0.8); }
}

/* MUSIC BUTTON */
#musicBtn {
    position: fixed;
    bottom: 15px;
    left: 15px;
    z-index: 10000;
    background: rgba(255,255,255,0.7);
    border: 1px solid #c9a34a;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 20px;
    cursor: pointer;
}

/* BASE */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5e6dc;
    text-align: center;
}

/* FRAME */
.frame1 {
    position: fixed;
    top: 15px; left: 15px; right: 15px; bottom: 15px;
    border: 2px solid #c9a34a;
}
.frame2 {
    position: fixed;
    top: 25px; left: 25px; right: 25px; bottom: 25px;
    border: 1px solid #c9a34a;
}

/* CONTENT */
.container {
    padding: 80px 20px;
}

/* TEXT */
.title {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: #b68b2c;
}

.name {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
}

.heart {
    font-size: 28px;
    color: red;
    animation: heartbeat 1.2s infinite;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

.button {
    display: inline-block;
    margin: 10px;
    padding: 10px 22px;
    border-radius: 25px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
}

/* ENTRY SCREEN */
#entryScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bolly-card {
    padding: 30px;
    background: gold;
    border-radius: 15px;
    cursor: pointer;
}

/* FADE */
.fadeOut {
    animation: fade 1.5s forwards;
}
@keyframes fade {
    to { opacity: 0; }
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <div class="bolly-card">Tap to Open 💍</div>
</div>

<div class="frame1"></div>
<div class="frame2"></div>

<div class="container">

<div class="title">Engagement Invitation</div>

<div class="name">Shrayansh</div>
<div class="heart">❤️</div>
<div class="name">Payal</div>

<div>04 May 2026</div>
<div>📍 Hotel GK Jain</div>

<a class="button" href="https://maps.app.goo.gl/zp1ytG2DvtsnHL5p6" target="_blank">
Get Directions 🚗
</a>

<div id="countdown" class="countdown-box"></div>

</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔇</button>

<script>

/* COUNTDOWN */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var d = Math.floor(distance / (1000*60*60*24));
  var h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  var m = Math.floor((distance % (1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  "⏳ " + d + " Days | " + h + " Hours | " + m + " Min";
}, 1000);

/* ELEMENTS */
const entry = document.getElementById("entryScreen");
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

/* OPEN INVITE */
document.querySelector(".bolly-card").addEventListener("click", openInvite);

function openInvite() {
  music.play().catch(()=>{});
  entry.classList.add("fadeOut");

  setTimeout(() => {
    entry.style.display = "none";
  }, 1500);
}

/* MUSIC BUTTON */
btn.addEventListener("click", () => {
  if (music.paused) {
    music.play();
    btn.innerHTML = "🔊";
  } else {
    music.pause();
    btn.innerHTML = "🔇";
  }
});

</script>

</body>
</html>
