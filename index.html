<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrayansh ❤️ Payal | Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5e6dc;
    overflow-x: hidden;
}

/* DOUBLE BORDER */
.frame1, .frame2 {
    position: fixed;
    border-radius: 20px;
    pointer-events: none;
}
.frame1 {
    top: 15px; left: 15px; right: 15px; bottom: 15px;
    border: 2px solid #c9a34a;
}
.frame2 {
    top: 25px; left: 25px; right: 25px; bottom: 25px;
    border: 1px solid #c9a34a;
}

/* RINGS */
.ring {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 28px;
}

/* ENTRY SCREEN */
#entryScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #2b0f0f, #000);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bolly-card {
    padding: 40px;
    border-radius: 20px;
    background: linear-gradient(135deg, #c9a34a, #fff2c2);
    cursor: pointer;
    text-align: center;
    animation: float 3s infinite;
}
@keyframes float {
    50% { transform: translateY(-10px); }
}

/* MAIN CONTENT */
.container {
    text-align: center;
    padding: 80px 20px;
}

/* TITLE */
.title {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: #b68b2c;
    text-shadow: 0 0 10px gold;
}

/* NAMES */
.name {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
}

/* HEART */
.heart {
    font-size: 28px;
    color: red;
    animation: heartbeat 1.2s infinite;
}
@keyframes heartbeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

/* TAGLINE */
.tagline {
    font-size: 12px;
    color: #555;
}

/* BUTTON */
.button {
    padding: 10px 20px;
    background: #c9a34a;
    color: white;
    border-radius: 20px;
    text-decoration: none;
}

/* COUNTDOWN */
#countdown {
    margin-top: 20px;
    padding: 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.7);
}

/* COUPLE IMAGE */
.couple {
    position: fixed;
    bottom: 0;
    left: -200px;
    width: 300px;
    animation: moveCouple 4s forwards;
}
@keyframes moveCouple {
    to { left: 60%; }
}

/* FLORAL */
.floral {
    position: fixed;
    width: 120px;
    height: 120px;
}
.floral-left { bottom: 20px; left: 10px; }
.floral-right { top: 20px; right: 10px; }

/* SPARKLES */
.sparkle {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}
@keyframes twinkle {
    50% { opacity: 0.2; }
}

/* FLOAT HEARTS */
.float-heart {
    position: fixed;
    color: red;
    animation: floatUp 2s linear;
}
@keyframes floatUp {
    to { transform: translateY(-100px); opacity: 0; }
}

/* MUSIC BUTTON */
#musicBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

/* FIREWORK */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: explode 1s linear;
}
@keyframes explode {
    to { transform: scale(10); opacity: 0; }
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <div class="bolly-card" onclick="openInvite()">
    Engagement 💍 <br> Tap to Open
  </div>
</div>

<div class="frame1"></div>
<div class="frame2"></div>

<div class="ring">💍💍</div>

<div class="container">
    <div class="title">Engagement Invitation</div>

    <div class="name">Shrayansh</div>
    <div class="heart">❤️</div>
    <div class="name">Payal</div>

    <div class="tagline">Celebrate love & happily ever after</div>

    <div><b>04 May 2026</b></div>
    <div>📍 Hotel GK Jain</div>

    <a class="button" href="https://maps.app.goo.gl/zp1ytG2DvtsnHL5p6" target="_blank">
        Get Directions 🚗
    </a>

    <div id="countdown"></div>
</div>

<img src="couple.png" class="couple">

<div class="floral floral-left"></div>
<div class="floral floral-right"></div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="toggleMusic()">🔇</button>

<script>

/* OPEN INVITE */
function openInvite() {
    document.getElementById("entryScreen").style.display = "none";
    document.getElementById("bgMusic").play();

    fireworks();
    createSparkles();
}

/* COUNTDOWN */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var d = Math.floor((countDownDate - now) / (1000*60*60*24));
  document.getElementById("countdown").innerHTML = "⏳ " + d + " days left";
}, 1000);

/* MUSIC */
function toggleMusic() {
  let music = document.getElementById("bgMusic");
  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
}

/* SPARKLES */
function createSparkles() {
    for (let i = 0; i < 30; i++) {
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random()*100+"%";
        s.style.top = Math.random()*100+"%";
        document.body.appendChild(s);
    }
}

/* FIREWORKS */
function fireworks() {
    for (let i=0;i<20;i++){
        let f=document.createElement("div");
        f.className="firework";
        f.style.left=Math.random()*100+"%";
        f.style.top=Math.random()*100+"%";
        document.body.appendChild(f);
    }
}

/* FLOAT HEARTS ON TOUCH */
document.addEventListener("click", function(e){
    let h=document.createElement("div");
    h.className="float-heart";
    h.innerHTML="❤️";
    h.style.left=e.clientX+"px";
    h.style.top=e.clientY+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
});

</script>

</body>
</html>
