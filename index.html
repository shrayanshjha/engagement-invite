<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrayansh ❤️ Payal | Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>

/* RESET */
html, body {
    margin: 0;
    padding: 0;
    background: #f5e6dc;
    overflow-x: hidden;
    font-family: 'Poppins', sans-serif;
}

/* ENTRY SCREEN */
#entryScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #2b0f0f, #000);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bolly-card {
    padding: 40px;
    border-radius: 20px;
    background: linear-gradient(135deg, #c9a34a, #fff2c2);
    box-shadow: 0 0 40px rgba(255,215,0,0.6);
    cursor: pointer;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    50% { transform: translateY(-10px); }
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 80px 20px 140px;
    position: relative;
    z-index: 5;
}

/* TITLE */
.title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    background: linear-gradient(90deg,#c9a34a,#fff2c2,#c9a34a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* NAMES */
.name {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
}

.heart {
    font-size: 30px;
    color: red;
    animation: heartbeat 1.2s infinite;
}

@keyframes heartbeat {
    50% { transform: scale(1.2); }
}

/* TAGLINE */
.tagline {
    margin: 10px 0;
}

/* BUTTON */
.button {
    display: inline-block;
    margin: 15px;
    padding: 12px 25px;
    border-radius: 25px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
}

/* COUNTDOWN */
#countdown {
    margin-top: 20px;
    padding: 10px 18px;
    border-radius: 25px;
    border: 1px solid #c9a34a;
}

/* COUPLE IMAGE (RIGHT + BIGGER) */
.couple {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 75vw;
    max-width: 380px;
    z-index: 2;
    pointer-events: none;
}

/* FLORAL */
.floral {
    position: fixed;
    width: 120px;
    height: 120px;
    z-index: 1;
}
.floral-left { bottom: 20px; left: 10px; }
.floral-right { top: 20px; right: 10px; }

.floral::before {
    content: "";
    width: 80px;
    height: 80px;
    background: pink;
    border-radius: 50%;
    position: absolute;
}

/* SPARKLES */
.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, gold, white);
    animation: sparkleAnim 1.5s forwards;
}

@keyframes sparkleAnim {
    to { transform: scale(2); opacity: 0; }
}

/* STARS */
.star {
    position: fixed;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* FIREWORK */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: explode 1s forwards;
}

@keyframes explode {
    to { transform: scale(20); opacity: 0; }
}

/* MUSIC BUTTON */
#musicBtn {
    position: fixed;
    bottom: 15px;
    left: 15px;
    z-index: 999;
    border-radius: 50%;
    width: 45px;
    height: 45px;
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <div class="bolly-card" onclick="openInvite()">
    Engagement 💍<br><small>Tap to Open</small>
  </div>
</div>

<div class="container">
<div class="title">Engagement Invitation</div>

<div class="name">Shrayansh</div>
<div class="heart">❤️</div>
<div class="name">Payal</div>

<div class="tagline">Celebrate love & happily ever after</div>

<div><b>04 May 2026</b></div>
<div>📍 Hotel GK Jain</div>

<a class="button" href="https://www.google.com/maps/dir/?api=1&destination=Hotel+GK+Jain" target="_blank">
Get Directions 🚗
</a>

<div id="countdown"></div>
</div>

<img src="couple.png" class="couple">
<div class="floral floral-left"></div>
<div class="floral floral-right"></div>

<audio id="bgMusic" loop>
<source src="music.mp3">
</audio>

<button id="musicBtn">🔇</button>

<script>

/* STARS */
for(let i=0;i<40;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}

/* COUNTDOWN */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=Math.floor((countDownDate-now)/(1000*60*60*24));
 let h=Math.floor((countDownDate-now)/(1000*60*60)%24);
 let m=Math.floor((countDownDate-now)/(1000*60)%60);
 document.getElementById("countdown").innerHTML =
 "⏳ "+d+" Days | "+h+" Hrs | "+m+" Min";
},1000);

/* OPEN */
function openInvite(){
 document.getElementById("entryScreen").style.display="none";
 document.getElementById("bgMusic").play();
 fireworks();
 sparkles();
}

/* FIREWORKS */
function fireworks(){
 for(let i=0;i<25;i++){
  let f=document.createElement("div");
  f.className="firework";
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*100+"vh";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
 }
}

/* SPARKLES */
function sparkles(){
 for(let i=0;i<40;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1500);
 }
}

/* MUSIC BUTTON */
const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

btn.onclick=()=>{
 if(music.paused){music.play();btn.innerHTML="🔊";}
 else{music.pause();btn.innerHTML="🔇";}
};

</script>

</body>
</html>
