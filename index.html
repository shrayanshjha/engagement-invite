<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrayansh ❤️ Payal | Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>

/* RESET BLACK SPACE */
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background: #f5e6dc;
}

/* ENTRY SCREEN */
#entryScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #2b0f0f, #000);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bolly-card {
    padding: 40px;
    border-radius: 20px;
    background: linear-gradient(135deg, #c9a34a, #fff2c2);
    box-shadow: 0 0 40px rgba(255,215,0,0.6);
    text-align: center;
    cursor: pointer;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    50% { transform: translateY(-10px); }
}

.entry-text {
    font-family: 'Cinzel', serif;
    font-size: 22px;
}

/* MAIN CONTAINER */
.container {
    text-align: center;
    padding: 80px 20px;
    position: relative;
    z-index: 5;
}

/* FRAME */
.frame1, .frame2 {
    position: fixed;
    border-radius: 20px;
    pointer-events: none;
}
.frame1 {
    top: 15px; left: 15px; right: 15px; bottom: 15px;
    border: 2px solid #c9a34a;
}
.frame2 {
    top: 25px; left: 25px; right: 25px; bottom: 25px;
    border: 1px solid #c9a34a;
}

/* TITLE */
.title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: #b68b2c;
    z-index: 10;
    position: relative;
}

/* NAMES */
.name {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
}

.heart {
    font-size: 30px;
    color: red;
    animation: heartbeat 1.2s infinite;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* QUOTE */
.tagline {
    font-size: 13px;
    margin: 10px 0;
}

/* BUTTON */
.button {
    display: inline-block;
    margin: 15px;
    padding: 12px 25px;
    border-radius: 25px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
}

/* COUNTDOWN */
#countdown {
    margin-top: 20px;
    padding: 10px 18px;
    display: inline-block;
    border-radius: 25px;
    border: 1px solid #c9a34a;
}

/* COUPLE IMAGE (FIXED - NO MOVE) */
.couple {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 60vw;
    max-width: 320px;
    z-index: 2;
    pointer-events: none;
}

/* FLORAL (FIXED - NO MOVE) */
.floral {
    position: fixed;
    width: 120px;
    height: 120px;
    z-index: 1;
}

.floral-left { bottom: 20px; left: 10px; }
.floral-right { top: 20px; right: 10px; }

.floral::before {
    content: "";
    position: absolute;
    width: 80px;
    height: 80px;
    background: pink;
    border-radius: 50%;
}

/* FIREWORKS */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    to {
        transform: scale(20);
        opacity: 0;
    }
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
    <div class="bolly-card" onclick="openInvite()">
        <div class="entry-text">
            Engagement 💍<br>
            <span>Tap to Open</span>
        </div>
    </div>
</div>

<!-- FRAME -->
<div class="frame1"></div>
<div class="frame2"></div>

<!-- MAIN -->
<div class="container">

<div class="title">Engagement Invitation</div>

<div class="name">Shrayansh</div>
<div class="heart">❤️</div>
<div class="name">Payal</div>

<div class="tagline">
Celebrate love, laughter & happily ever after
</div>

<div><b>04 May 2026</b></div>
<div>📍 Hotel GK Jain</div>

<a class="button" href="https://maps.app.goo.gl/zp1ytG2DvtsnHL5p6" target="_blank">
Get Directions 🚗
</a>

<div id="countdown"></div>

</div>

<!-- DECOR -->
<img src="couple.png" class="couple">
<div class="floral floral-left"></div>
<div class="floral floral-right"></div>

<script>

/* COUNTDOWN */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var d = Math.floor(distance / (1000*60*60*24));
  var h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  var m = Math.floor((distance % (1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  "⏳ " + d + " Days | " + h + " Hours | " + m + " Min";
}, 1000);

/* OPEN INVITE */
function openInvite() {
    document.getElementById("entryScreen").style.display = "none";
    fireworks();
}

/* FIREWORKS */
function fireworks() {
    for (let i = 0; i < 25; i++) {
        let f = document.createElement("div");
        f.className = "firework";
        f.style.left = Math.random()*100 + "vw";
        f.style.top = Math.random()*100 + "vh";
        document.body.appendChild(f);

        setTimeout(()=>f.remove(),1000);
    }
}

</script>

</body>
</html>
