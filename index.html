<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shrayansh ❤️ Payal | Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>

/* FULL HEIGHT FIX */
html, body {
    height: 100%;
    margin: 0;
}

body {
    min-height: 100vh;
    background: #f5e6dc;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
}

/* ENTRY SCREEN */
#entryScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #2b0f0f, #000);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bolly-card {
    padding: 40px 30px;
    border-radius: 20px;
    background: linear-gradient(135deg, #c9a34a, #fff2c2);
    box-shadow: 0 0 40px rgba(255,215,0,0.6);
    text-align: center;
    cursor: pointer;
    animation: floatCard 3s ease-in-out infinite;
}

@keyframes floatCard {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.fadeOut {
    animation: fade 1.5s forwards;
}

@keyframes fade {
    to { opacity: 0; }
}

/* FRAME */
.frame1, .frame2 {
    position: fixed;
    border-radius: 20px;
    pointer-events: none;
}
.frame1 { top: 15px; left: 15px; right: 15px; bottom: 15px; border: 2px solid #c9a34a; }
.frame2 { top: 25px; left: 25px; right: 25px; bottom: 25px; border: 1px solid #c9a34a; }

/* CONTAINER */
.container {
    text-align: center;
    min-height: 100vh;
    padding: 80px 20px 140px;
}

/* TITLE */
.title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    background: linear-gradient(90deg, #c9a34a, #fff2c2, #c9a34a);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}
@keyframes shine {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

/* NAMES */
.name {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
}

/* HEART */
.heart {
    font-size: 28px;
    color: #e63946;
    animation: heartbeat 1.2s infinite, glowHeart 2s infinite alternate;
}
@keyframes heartbeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
@keyframes glowHeart {
    from { filter: drop-shadow(0 0 5px red); }
    to { filter: drop-shadow(0 0 15px red); }
}

/* TAGLINE */
.tagline {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    margin-top: 10px;
    background: linear-gradient(90deg, #8f8f8f, #d9d9d9, #7a7a7a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* BUTTON */
.button {
    display: inline-block;
    margin: 15px;
    padding: 12px 25px;
    border-radius: 30px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* COUNTDOWN */
#countdown {
    margin-top: 20px;
    padding: 12px 20px;
    display: inline-block;
    font-family: 'Cinzel', serif;
    color: #b68b2c;
    background: rgba(255,255,255,0.7);
    border-radius: 30px;
    border: 1px solid #c9a34a;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from { box-shadow: 0 0 5px rgba(201,163,74,0.4); }
    to { box-shadow: 0 0 18px rgba(201,163,74,0.8); }
}

/* COUPLE */
.couple {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 65vw;
    max-width: 320px;
    z-index: 5;
}

/* FLORAL */
.floral {
    position: fixed;
    width: 120px;
    height: 120px;
}
.floral-left { bottom: 20px; left: 10px; }
.floral-right { top: 20px; right: 10px; }

.floral::before, .floral::after {
    content: "";
    position: absolute;
    border-radius: 50%;
}
.floral::before {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #f8c8dc, #f2a7c0);
}
.floral::after {
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, #ffd6e8, #f8c8dc);
    top: 30px;
    left: 40px;
}

/* RING */
.ring {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 28px;
}

/* MUSIC BUTTON */
#musicBtn {
    position: fixed;
    bottom: 15px;
    left: 15px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entryScreen">
  <div class="bolly-card">Tap to Open 💍</div>
</div>

<div class="frame1"></div>
<div class="frame2"></div>

<div class="ring">💍💍</div>

<div class="container">

<div class="title">Engagement Invitation</div>

<div class="name">Shrayansh</div>
<div class="heart">❤️</div>
<div class="name">Payal</div>

<div class="tagline">
Celebrate love, laughter <br> & happily ever after
</div>

<br>

<div><b>04 May 2026</b></div>
<div>📍 Hotel GK Jain</div>

<a class="button"
href="https://www.google.com/maps/dir/?api=1&destination=Hotel+GK+Jain"
target="_blank">
Get Directions 🚗
</a>

<div id="countdown"></div>

</div>

<img src="couple.png" class="couple">

<div class="floral floral-left"></div>
<div class="floral floral-right"></div>

<audio id="bgMusic" loop>
  <source src="music.mp3">
</audio>

<button id="musicBtn">🔇</button>

<script>

/* ELEMENTS */
const entry = document.getElementById("entryScreen");
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

/* ENTRY CLICK FIXED */
document.querySelector(".bolly-card").addEventListener("click", function() {
    music.play().catch(()=>{});
    entry.classList.add("fadeOut");
    setTimeout(() => {
        entry.style.display = "none";
    }, 1500);
});

/* COUNTDOWN */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var d = Math.floor(distance / (1000*60*60*24));
  var h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  var m = Math.floor((distance % (1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  "⏳ " + d + " Days | " + h + " Hours | " + m + " Min";
}, 1000);

/* MUSIC BUTTON */
btn.addEventListener("click", () => {
  if (music.paused) {
    music.play();
    btn.innerHTML = "🔊";
  } else {
    music.pause();
    btn.innerHTML = "🔇";
  }
});

</script>

</body>
</html>
