    /* TWINKLE STARS */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    opacity: 0.8;

/* GOLD */

    background: radial-gradient(circle, #ffd700, #c9a34a);
    box-shadow: 0 0 6px #ffd700;
}

/* SILVER */

    background: radial-gradient(circle, #ffffff, #c0c0c0);
    box-shadow: 0 0 5px #ffffff;
}

/* TWINKLE ANIMATION */
@keyframes twinkle {
    0% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }

    /* BASE FLORAL */
.floral {
    position: fixed;

/* RIGHT SIDE */

    top: 20px;

}

/* FLOWER PETALS */
.floral::before,
.floral::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;
}

/* BIG PETAL */
.floral::before {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #f8c8dc, #f2a7c0);
}

/* SMALL PETAL */
.floral::after {
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, #ffd6e8, #f8c8dc);
    top: 30px;
    left: 40px;
}

/* EXTRA BLOOM EFFECT */

<script>
/* COUNTDOWN */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();

setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var d = Math.floor(distance / (1000*60*60*24));
  var h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  var m = Math.floor((distance % (1000*60*60))/(1000*60));

  document.getElementById("countdown").innerHTML =
  "⏳ " + d + " days " + h + " hrs " + m + " min left";
}, 1000);


/* PETALS */
function createPetal() {
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.style.left = Math.random() * window.innerWidth + "px";
  petal.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(petal);

  setTimeout(() => petal.remove(), 10000);
}
setInterval(createPetal, 500);


/* STARS */
function createStars() {
  for (let i = 0; i < 40; i++) {
    const s = document.createElement("div");
    s.classList.add("sparkle");

    s.classList.add(Math.random() > 0.5 ? "gold" : "silver");

    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";

    s.style.animationDuration = (1.5 + Math.random() * 2) + "s";

    document.body.appendChild(s);
  }
}
createStars();


/* ENTRY + MUSIC */
const entry = document.getElementById("entryScreen");
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

// Floating gold particles
function createGoldParticles() {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.classList.add("gold-particle");
    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(p);

    setTimeout(() => p.remove(), 6000);
  }
}
setInterval(createGoldParticles, 1500);


// TAP TO enter
document.querySelector(".bolly-card").addEventListener("click", openInvite);
entry.addEventListener("click", openInvite);

function openInvite() {
  music.play().catch(() => {});

  document.body.style.transform = "scale(1.1)";
  document.body.style.transition = "transform 1s";

  entry.classList.add("fadeOut");

  setTimeout(() => {
    entry.style.display = "none";
    document.body.style.transform = "scale(1)";
  }, 1500);
}


// MUSIC BUTTON
btn.addEventListener("click", () => {
  if (music.paused) {
    music.play();
    btn.innerHTML = "🔊";
  } else {
    music.pause();
    btn.innerHTML = "🔇";
  }
});
    
</script>
