<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>
    #musicBtn {
    position: fixed;
    bottom: 20px;
    left: 20px;   /* better than left */
    z-index: 99999;

    width: 50px;
    height: 50px;
    border-radius: 50%;

    border: 1px solid #c9a34a;
    background: rgba(255,255,255,0.2);

    font-size: 20px;
    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;

    backdrop-filter: blur(6px);
    }

/* BODY */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5e6dc;
    overflow-x: hidden;
}

/* DOUBLE BORDER */
.frame1, .frame2 {
    position: fixed;
    border-radius: 20px;
    pointer-events: none;
}
.frame1 {
    top: 15px; left: 15px; right: 15px; bottom: 15px;
    border: 2px solid #c9a34a;
}
.frame2 {
    top: 25px; left: 25px; right: 25px; bottom: 25px;
    border: 1px solid #c9a34a;
}

/* RINGS */
.ring {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 26px;
}

/* CONTAINER */
.container {
    text-align: center;
    padding: 90px 20px 220px; /* extra bottom space for image */
    position: relative;
    z-index: 5;
}

/* TITLE */
.title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: #b68b2c;
    text-shadow: 0 0 10px gold;
}

/* NAMES */
.name {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    color: #b68b2c;
}
.couple,
.floral,
.frame1,
.frame2 {
    transform: none !important;
}
    .couple {
    position: fixed;
    z-index: 3;
}
    .container {
    transform: translateZ(0);
    }

.floral {
    position: fixed;
    z-index: 1;
}
/* HEART */
.heart {
    display: inline-block;
    font-size: 28px;
    margin: 8px 0;

    animation: heartbeat 1.2s infinite;

    transform-origin: center;
    will-change: transform;

    position: relative;   /* IMPORTANT */
    z-index: 2;
}
@keyframes heartbeat {
    50% { transform: scale(1.2); }
}
@keyframes glow {
    from { text-shadow: 0 0 5px red; }
    to { text-shadow: 0 0 15px red; }
}

/* TAGLINE */
.tagline {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    margin: 10px 0;
}
.amp {
    font-size: 16px;
}

/* BUTTON */
.button {
    display: inline-block;
    margin: 15px 0;
    padding: 12px 25px;
    border-radius: 25px;
    background: #c9a34a;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* COUNTDOWN */
#countdown {
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 25px;
    background: rgba(255,255,255,0.8);
    display: inline-block;
}

/* COUPLE IMAGE (FIXED + VISIBLE) */
.couple {
    position: fixed;
    bottom: 0;
    left: -200px;
    width: 320px;
    z-index: 2;
    animation: moveCouple 3s ease forwards;
}
@keyframes moveCouple {
    from { left: -200px; }
    to { left: calc(100% - 320px); }
}

/* FLORAL */
.floral {
    position: fixed;
    width: 120px;
    height: 120px;
    z-index: 1;
}
.floral-left { bottom: 20px; left: 10px; }
.floral-right { top: 20px; right: 10px; }

.floral::before {
    content: "";
    width: 80px;
    height: 80px;
    background: pink;
    border-radius: 50%;
    position: absolute;
}

/* SPARKLES */
.sparkle {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}
@keyframes twinkle {
    50% { opacity: 0.2; }
}

/* FLOAT HEART */
.float-heart {
    position: fixed;
    color: red;
    animation: floatUp 2s linear;
}
@keyframes floatUp {
    to { transform: translateY(-120px); opacity: 0; }
}

/* ENTRY SCREEN */
#entryScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #2b0f0f, #000);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}
.bolly-card {
    padding: 40px;
    background: linear-gradient(#c9a34a,#fff2c2);
    border-radius: 20px;
    cursor: pointer;
}

/* FIREWORK */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: explode 1s linear;
}
@keyframes explode {
    to { transform: scale(10); opacity: 0; }
}
/* NEW TWINKLING STARS */
.star-blink {
    position: fixed;
    background: #b68b2c; /* Gold color to match your theme */
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    box-shadow: 0 0 3px #f5e6dc;
    animation: starTwinkle var(--speed) ease-in-out infinite;
}

@keyframes starTwinkle {
    0%, 100% { opacity: 0.1; transform: scale(0.8); }
    50% { opacity: 0.7; transform: scale(1.2); }
}

</style>
</head>

<body>

<div id="entryScreen">
  <div class="bolly-card" onclick="openInvite()">Tap to Open 💍</div>
</div>

<div class="frame1"></div>
<div class="frame2"></div>
<div class="ring">💍💍</div>

<div class="container">

<div class="title">Engagement Invitation</div>

<div class="name">Shrayansh</div>
<div class="heart">❤️</div>
<div class="name">Payal</div>

<div class="tagline">
<div>Celebrating love</div>
<div class="amp">&</div>
<div>happily ever after</div>
</div>

<div><b>04 May 2026</b></div>
<div>📍 Hotel GK Jain</div>

<a class="button" href="https://maps.app.goo.gl/zp1ytG2DvtsnHL5p6" target="_blank">
Get Directions 🚗
</a>

<div id="countdown"></div>

</div>

<img src="couple.png" class="couple">
<div class="floral floral-left"></div>
<div class="floral floral-right"></div>

<audio id="bgMusic" loop>
<source src="music.mp3">
</audio>
<button id="musicBtn">🔇</button>
<script>

/* OPEN */
function openInvite(){
 document.getElementById("entryScreen").style.display="none";
 document.getElementById("bgMusic").play();
 fireworks();
}

/* COUNTDOWN */
var countDownDate = new Date("May 4, 2026 13:00:00").getTime();

setInterval(function(){
 let now=new Date().getTime();
 let d=Math.floor((countDownDate-now)/(1000*60*60*24));
 let h=Math.floor((countDownDate-now)/(1000*60*60)%24);
 let m=Math.floor((countDownDate-now)/(1000*60)%60);

 document.getElementById("countdown").innerHTML =
 "⏳ "+d+" Days | "+h+" Hrs | "+m+" Min";
},1000);

/* FIREWORK */
function fireworks(){
 for(let i=0;i<20;i++){
  let f=document.createElement("div");
  f.className="firework";
  f.style.left=Math.random()*100+"%";
  f.style.top=Math.random()*100+"%";
  document.body.appendChild(f);
 }
}

/* FLOAT HEART */
document.addEventListener("click", function(e){
 let h=document.createElement("div");
 h.className="float-heart";
 h.innerHTML="❤️";
 h.style.left=e.clientX+"px";
 h.style.top=e.clientY+"px";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),2000);
});
const btn = document.getElementById("musicBtn");
const music = document.getElementById("bgMusic");

btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.innerHTML = "🔊";
    } else {
        music.pause();
        btn.innerHTML = "🔇";
    }
});
    /* GENERATE STARS FUNCTION */
function addStars() {
    for (let i = 0; i < 50; i++) {
        let s = document.createElement("div");
        s.className = "star-blink";
        let size = Math.random() * 3 + 1 + "px";
        s.style.width = size;
        s.style.height = size;
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        s.style.setProperty('--speed', (Math.random() * 2 + 2) + "s");
        s.style.animationDelay = Math.random() * 5 + "s";
        document.body.appendChild(s);
    }
}

/* TRIGGER STARS ON OPEN */
const originalOpenInvite = openInvite;
openInvite = function() {
    originalOpenInvite();
    addStars();
};

</script>

</body>
</html>
